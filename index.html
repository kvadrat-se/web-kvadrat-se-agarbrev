<title>Kvadrat — kommer snart</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Saira+Extra+Condensed:wght@800;900&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
:root{--marin:#1C1C68;--lila:#9088FB;--gron:#00BE81;--lime:#D9FCD9;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{background:var(--marin);color:#fff;font-family:'IBM Plex Sans',Arial,sans-serif;
  display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden;position:relative;text-align:left;}
.uf{position:absolute;pointer-events:none;}
.uf svg{display:block;width:100%;height:100%;}
.uf path{fill:none;stroke-width:2;stroke-dasharray:1;stroke-dashoffset:1;animation:draw 2.6s ease forwards .3s;}
@keyframes draw{to{stroke-dashoffset:0;}}
.uf-1{top:-110px;right:-130px;width:460px;height:466px;animation:float 12s ease-in-out infinite;}
.uf-1 path{stroke:var(--lila);}
.uf-2{bottom:-140px;left:-130px;width:320px;height:324px;animation:float 15s ease-in-out infinite reverse;}
.uf-2 path{stroke:rgba(0,190,129,.6);}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-20px) rotate(4deg);}}
.wrap{position:relative;z-index:5;max-width:680px;padding:40px;}
.logo{height:34px;margin-bottom:42px;}
.kicker{font-weight:600;text-transform:uppercase;letter-spacing:3px;font-size:14px;color:var(--lime);margin-bottom:14px;}
h1{font-family:'Saira Extra Condensed',sans-serif;font-weight:900;text-transform:uppercase;font-size:clamp(48px,9vw,104px);line-height:.95;letter-spacing:.5px;}
p.lead{font-size:19px;color:#E7E4FE;margin-top:22px;max-width:520px;line-height:1.6;}
.dot{display:inline-block;width:11px;height:11px;border-radius:50%;background:var(--gron);margin-right:10px;vertical-align:middle;animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.35;transform:scale(.8);}50%{opacity:1;transform:scale(1.15);}}
.foot{position:absolute;bottom:26px;left:0;right:0;text-align:center;z-index:5;font-size:12.5px;color:#A9A4E8;letter-spacing:.5px;}
</style>
